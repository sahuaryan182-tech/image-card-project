<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Card Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --surface2: #1a1e28;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.14);
      --accent: #c8f04a;
      --accent-dim: rgba(200,240,74,0.12);
      --accent-dim2: rgba(200,240,74,0.06);
      --text: #f0f2f5;
      --text-muted: #7a7f8e;
      --text-soft: #b0b5c3;
      --radius: 16px;
      --radius-sm: 10px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }

    /* ── HEADER ── */
    header {
      padding: 48px 40px 0;
      max-width: 1100px;
      margin: 0 auto;
      animation: fadeUp 0.6s ease both;
    }

    .header-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .header-eyebrow::before {
      content: '';
      width: 20px;
      height: 1.5px;
      background: var(--accent);
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      margin-top: 12px;
      font-size: 15px;
      color: var(--text-muted);
      font-weight: 300;
      max-width: 440px;
    }

    /* ── MAIN LAYOUT ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 40px 80px;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 32px;
      align-items: start;
    }

    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; padding: 24px 20px 60px; }
      header { padding: 36px 20px 0; }
    }

    /* ── FORM PANEL ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      position: sticky;
      top: 32px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 22px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-soft);
      margin-bottom: 7px;
      letter-spacing: 0.04em;
    }

    .field input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .field input[type="text"]::placeholder { color: var(--text-muted); }

    .field input[type="text"]:focus {
      border-color: var(--accent);
      background: var(--accent-dim2);
    }

    /* File Upload */
    .file-drop {
      width: 100%;
      background: var(--surface2);
      border: 1.5px dashed var(--border-hover);
      border-radius: var(--radius-sm);
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .file-drop:hover, .file-drop.has-file {
      border-color: var(--accent);
      background: var(--accent-dim2);
    }

    .file-drop input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .file-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
    }

    .file-icon svg { width: 18px; height: 18px; stroke: var(--accent); fill: none; stroke-width: 1.8; }

    .file-drop-text {
      font-size: 13px;
      color: var(--text-soft);
      font-weight: 400;
    }

    .file-drop-text strong { color: var(--accent); font-weight: 500; }
    .file-drop-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .file-name { font-size: 12px; color: var(--accent); margin-top: 6px; font-weight: 500; }

    /* Submit Button */
    .btn-submit {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: var(--accent);
      color: #0d0f14;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-submit:hover { opacity: 0.88; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit.loading { opacity: 0.6; pointer-events: none; }

    .btn-submit svg { width: 16px; height: 16px; stroke: #0d0f14; fill: none; stroke-width: 2.2; }

    /* Status message */
    .status {
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
      transition: color 0.2s;
    }
    .status.ok { color: var(--accent); }
    .status.err { color: #ff6b6b; }

    /* ── CARDS SECTION ── */
    .cards-section {
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .section-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--text);
    }

    .count-badge {
      font-size: 12px;
      font-weight: 600;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid rgba(200,240,74,0.2);
    }

    /* Empty state */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 14px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    .empty-state svg { width: 40px; height: 40px; stroke: var(--border-hover); fill: none; stroke-width: 1.2; margin-bottom: 12px; }

    /* Cards Grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }

    /* Individual Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
      animation: cardIn 0.4s ease both;
    }

    .card:hover {
      border-color: var(--border-hover);
      transform: translateY(-3px);
    }

    .card-img-wrap {
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--surface2);
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .card:hover .card-img-wrap img { transform: scale(1.04); }

    .card-body {
      padding: 14px;
    }

    .card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-course {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-tag {
      display: inline-block;
      margin-top: 10px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 3px 9px;
      border-radius: 20px;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }
  </style>
</head>

<body>

<header>
  <div class="header-eyebrow">Student Portal</div>
  <h1>Card <span>Generator</span></h1>
  <p>Upload a photo, fill in your details, and generate a clean student card instantly.</p>
</header>

<main>

  <!-- Form Panel -->
  <div class="panel">
    <div class="panel-title">New Card</div>

    <div class="field">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="e.g. Aryan Sahu" />
    </div>

    <div class="field">
      <label>Course / Program</label>
      <input type="text" id="course" placeholder="e.g. Full Stack Development" />
    </div>

    <div class="field">
      <label>Profile Photo</label>
      <div class="file-drop" id="fileDrop">
        <input type="file" id="image" accept="image/*" onchange="handleFile(this)" />
        <div class="file-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <div class="file-drop-text"><strong>Click to upload</strong> or drag & drop</div>
        <div class="file-drop-hint">PNG, JPG, WEBP — max 5MB</div>
        <div class="file-name" id="fileName"></div>
      </div>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="createCard()">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Generate Card
    </button>

    <div class="status" id="status"></div>
  </div>

  <!-- Cards Section -->
  <div class="cards-section">
    <div class="section-header">
      <h2>All Cards</h2>
      <span class="count-badge" id="countBadge">0 cards</span>
    </div>
    <div class="cards-grid" id="cards">
      <div class="empty-state">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <p>No cards yet.<br>Create your first one!</p>
      </div>
    </div>
  </div>

</main>

<script>
  const API = "http://localhost:5000";

  function handleFile(input) {
    const file = input.files[0];
    const drop = document.getElementById('fileDrop');
    const nameEl = document.getElementById('fileName');
    if (file) {
      drop.classList.add('has-file');
      nameEl.textContent = file.name;
    } else {
      drop.classList.remove('has-file');
      nameEl.textContent = '';
    }
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + type;
    if (type === 'ok') setTimeout(() => el.textContent = '', 3000);
  }

  async function createCard() {
    const name   = document.getElementById('name').value.trim();
    const course = document.getElementById('course').value.trim();
    const image  = document.getElementById('image').files[0];
    const btn    = document.getElementById('submitBtn');

    if (!name || !course || !image) {
      setStatus('Please fill in all fields and select an image.', 'err');
      return;
    }

    btn.classList.add('loading');
    btn.textContent = 'Uploading…';
    setStatus('', '');

    try {
      const formData = new FormData();
      formData.append('name', name);
      formData.append('course', course);
      formData.append('image', image);

      const res  = await fetch(`${API}/upload`, { method: 'POST', body: formData });
      const data = await res.json();

      if (!res.ok) throw new Error(data.message || 'Upload failed');

      setStatus('Card created successfully!', 'ok');
      document.getElementById('name').value   = '';
      document.getElementById('course').value = '';
      document.getElementById('image').value  = '';
      document.getElementById('fileName').textContent = '';
      document.getElementById('fileDrop').classList.remove('has-file');
      loadCards();
    } catch (err) {
      setStatus(err.message || 'Something went wrong.', 'err');
    } finally {
      btn.classList.remove('loading');
      btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#0d0f14;fill:none;stroke-width:2.2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> Generate Card`;
    }
  }

  async function loadCards() {
    try {
      const res  = await fetch(`${API}/cards`);
      const data = await res.json();
      const container = document.getElementById('cards');
      const badge     = document.getElementById('countBadge');

      badge.textContent = `${data.length} card${data.length !== 1 ? 's' : ''}`;

      if (!data.length) {
        container.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <p>No cards yet.<br>Create your first one!</p>
          </div>`;
        return;
      }

      container.innerHTML = data.map((card, i) => `
        <div class="card" style="animation-delay:${i * 0.06}s">
          <div class="card-img-wrap">
            <img src="${API}/uploads/${card.image}" alt="${card.name}" loading="lazy" />
          </div>
          <div class="card-body">
            <div class="card-name">${card.name}</div>
            <div class="card-course">${card.course}</div>
            <span class="card-tag">Student</span>
          </div>
        </div>
      `).join('');
    } catch {
      document.getElementById('countBadge').textContent = 'Offline';
    }
  }

  loadCards();
</script>

</body>
</html>
